    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    const ensureNoAdjacentDuplicateExercises = (list) => {
      if (list.length < 2) return list;
      let arr = [...list];
      const hasAdjacentDupes = (a) => a.some((it, idx) => idx > 0 && it.name === a[idx - 1].name);
      let attempts = 0;
      while (hasAdjacentDupes(arr) && attempts < 20) { arr = shuffleArray(arr); attempts++; }
      if (hasAdjacentDupes(arr)) {
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i].name === arr[i + 1].name) {
            for (let j = i + 2; j < arr.length; j++) {
              if (arr[j].name !== arr[i].name) {
                [arr[i + 1], arr[j]] = [arr[j], arr[i + 1]];
                break;
              }
            }
          }
        }
      }
      return arr;
    };

    const fmtClock = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s < 10 ? "0" : ""}${s}`;
    };

    // Audio: reuse a single AudioContext (mobile browsers can throttle if you create many)
    const getAudioCtx = (() => {
      let ctx = null;
      return () => {
        try{
          if(!ctx || ctx.state === "closed"){
            ctx = new (window.AudioContext||window.webkitAudioContext)();
          }
          return ctx;
        }catch(e){ return null; }
      };
    })();

    const beep = (freq=880, dur=0.09, vol=0.08) => {
      try{
        const ctx = getAudioCtx();
        if(!ctx) return;
        if(ctx.state === "suspended") ctx.resume().catch(()=>{});
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.frequency.value = freq; o.type = "sine";
        g.gain.value = vol;
        o.connect(g); g.connect(ctx.destination);
        o.start();
        o.stop(ctx.currentTime + dur);
      }catch(e){}
    };

    const tripleBeep = () => {
      beep(880,0.08);
      setTimeout(()=>beep(880,0.08), 130);
      setTimeout(()=>beep(880,0.08), 260);
    };

    const todayKey = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${dd}`;
    };

    const ROTATION = ["strength","flow","hellfire"]; // H -> L -> M

    const getSuggestedMode = () => {
      const raw = localStorage.getItem(LS.LAST_COMPLETED);
      const t = todayKey();
      if(!raw) return "strength";
      try{
        const last = JSON.parse(raw);
        if(last?.date === t) return last?.mode || "strength";
        const idx = ROTATION.indexOf(last?.mode);
        if(idx === -1) return "strength";
        return ROTATION[(idx+1) % ROTATION.length];
      }catch(e){
        return "strength";
      }
    };

    const markCompleted = (mode) => {
      localStorage.setItem(LS.LAST_COMPLETED, JSON.stringify({ date: todayKey(), mode }));

    /**********************
     * Wakelock
     **********************/
    async function requestWakeLock(setState){
      try{
        if("wakeLock" in navigator){
          const lock = await navigator.wakeLock.request("screen");
          setState({ supported:true, active:true, lock });
          lock.addEventListener("release", ()=>setState(prev=>({...prev, active:false, lock:null})));
        }else{
          setState({ supported:false, active:false, lock:null });
        }
      }catch(e){
        setState({ supported:true, active:false, lock:null });
      }
    }
    async function releaseWakeLock(wl, setState){
      try{ if(wl?.lock){ await wl.lock.release(); } }catch(e){}
      setState(prev=>({...prev, active:false, lock:null}));
    }

    const FLOW_DB = {
      Push: [

      ],

        {name:"Cossack Squat", type:"grind"},

      ]
    };

    const rInt = (n) => Math.floor(Math.random()*n);
    const rChoice = (arr) => arr[rInt(arr.length)];

    function generateFlow22({count=5, avoidNames=[]}){
      const baseCats = ["Push","Pull","Squat","Hinge"];
      const cap = Math.max(4, Math.min(6, count));
      const doubleCat = rChoice(baseCats);

      const plan = [...baseCats];
      if(cap >= 5) plan.push(doubleCat);
      if(cap === 6){
        const remaining = baseCats.filter(c => c !== doubleCat);
        plan.push(rChoice(remaining));
      }

      const pickFromCat = (cat, triesAvoid=true) => {
        const pool = FLOW_DB[cat] || [];
        if(!pool.length) return null;
        if(triesAvoid){
          const filtered = pool.filter(x => !avoidNames.includes(x.name));
          if(filtered.length) return { ...rChoice(filtered), cat };
        }
        return { ...rChoice(pool), cat };
      };

      let out = [];
      let seen = new Set();

      for(const cat of plan){
        let ex = pickFromCat(cat, true);
        let guard = 0;
        while(ex && seen.has(ex.name) && guard < 10){
          ex = pickFromCat(cat, false);
          guard++;
        }
        if(ex && !seen.has(ex.name)){
          seen.add(ex.name);
          out.push(ex);
        }
      }

      while(out.length < cap){
        const cat = rChoice(baseCats);
        let ex = pickFromCat(cat, true);
        let guard = 0;
        while(ex && (seen.has(ex.name) || out.filter(o=>o.cat===cat).length>=2) && guard < 12){
          ex = pickFromCat(cat, false);
          guard++;
        }
        if(ex && !seen.has(ex.name) && out.filter(o=>o.cat===cat).length<2){
          seen.add(ex.name);
          out.push(ex);
        }else{
          break;
        }
      }

      const hasGrind = out.some(o => o.type === "grind");
      const hasBallistic = out.some(o => o.type === "ballistic");
      if(!(hasGrind && hasBallistic)){
        const need = hasGrind ? "ballistic" : "grind";
        for(let i=0;i<out.length;i++){
          const cat = out[i].cat;
          const pool = (FLOW_DB[cat]||[]).filter(x => x.type === need && !seen.has(x.name) && !avoidNames.includes(x.name));
          if(pool.length){
            seen.delete(out[i].name);
            out[i] = { ...rChoice(pool), cat };
            seen.add(out[i].name);
            break;
          }
        }
      }

      out = shuffleArray(out);
      const ballistic = out.filter(x => x.type === "ballistic").length;
      const grind = out.filter(x => x.type === "grind").length;
      return { flow: out, doubleCat, ballistic, grind };
    }

    function App(){
      // UI mode (restored)
      const [mode, setMode] = useState("auto"); // auto | strength | flow | hellfire
      const [suggested, setSuggested] = useState(getSuggestedMode());

      const effectiveMode = useMemo(()=> mode === "auto" ? suggested : mode, [mode, suggested]);

      // ===== Wakelock state =====

      // ===== Strength state (persisted) =====
      const [strengthOrder, setStrengthOrder] = useState(BIG_SIX.map(x=>x.key));
      const [strengthRepsStack, setStrengthRepsStack] = useState(Object.fromEntries(BIG_SIX.map(x=>[x.key, []]))); // per lift: [reps,reps,...]
      const strengthSets = useMemo(() => {
        const out = {};
        for(const x of BIG_SIX){
          out[x.key] = (strengthRepsStack?.[x.key]?.length) || 0;
        }
        return out;
      }, [strengthRepsStack]);

      // Stability counter (buffered 0..6)
      const [stability, setStability] = useState(0);

      // ===== Hellfire state =====
      const [level, setLevel] = useState("beginner");
      const [totalSU, setTotalSU] = useState(300);
      const [workout, setWorkout] = useState([]);
      const [hfGeneratedSU, setHfGeneratedSU] = useState(0);
      const [history, setHistory] = useState([]);
      const [expandedIndex, setExpandedIndex] = useState(null);
      const [lastWorkoutExercises, setLastWorkoutExercises] = useState([]);

      // Hellfire timer
      const [hfTimerRunning, setHfTimerRunning] = useState(false);
      const [hfTime, setHfTime] = useState(0);
      const hfIntervalRef = useRef(null);

      // ===== Flow state =====
      const [flowCount, setFlowCount] = useState(5);
      const [flowList, setFlowList] = useState([]);
      const [flowDoubleCat, setFlowDoubleCat] = useState(null);
      const [flowTimerPreset, setFlowTimerPreset] = useState(10*60);
      const [flowRemaining, setFlowRemaining] = useState(10*60);
      const [flowRunning, setFlowRunning] = useState(false);
      const flowIntervalRef = useRef(null);

      // Segment 2 timer (persisted)
      const [s2Phase, setS2Phase] = useState("idle"); // idle | right | rest1 | left | rest2
      const [s2Remaining, setS2Remaining] = useState(60);
      const [s2Running, setS2Running] = useState(false);
      const s2IntervalRef = useRef(null);

      const [beepsOn, setBeepsOn] = useState(true);

      // INIT restore
      useEffect(()=>{
        // UI mode restore
        const ui = localStorage.getItem(LS.UI_MODE);
        if(ui && ["auto","strength","flow","hellfire"].includes(ui)) setMode(ui);

        // Strength restore
        const sRaw = localStorage.getItem(LS.STRENGTH_ACTIVE);
        if(sRaw){
          try{
            const s = JSON.parse(sRaw);
            if(Array.isArray(s?.order) && s.order.length){
              const valid = s.order.filter(k => BIG_SIX.some(x=>x.key===k));
              if(valid.length === BIG_SIX.length) setStrengthOrder(valid);
            }
            // repsStack (preferred)
            if(s?.repsStack && typeof s.repsStack === "object"){
              const next = Object.fromEntries(BIG_SIX.map(x=>[x.key, []]));
              for(const k of Object.keys(next)){
                const arr = s.repsStack?.[k];
                if(Array.isArray(arr)){
                  next[k] = arr
                    .map(v => Number(v))
                    .filter(v => Number.isFinite(v) && v>=1 && v<=5)
                    .map(v => Math.round(v));
                }
              }
              setStrengthRepsStack(next);
            }else if(s?.sets && typeof s.sets === "object"){
              // Backward compatibility: migrate old set counters to 5-rep stacks.
              const next = Object.fromEntries(BIG_SIX.map(x=>[x.key, []]));
              for(const k of Object.keys(next)){
                const n = Number(s.sets?.[k]);
                if(Number.isFinite(n) && n>0){
                  next[k] = Array.from({length: Math.max(0, Math.floor(n))}, ()=>5);
                }
              }
              setStrengthRepsStack(next);
            }
          }catch(e){}
        }

        // Stability restore
        const stRaw = localStorage.getItem(LS.STRENGTH_STABILITY);
        if(stRaw){
          try{
            const obj = JSON.parse(stRaw);
            const v = Number(obj?.value);
            if(Number.isFinite(v)) setStability(Math.max(0, Math.min(6, Math.floor(v))));
          }catch(e){}
        }

        // Hellfire history + last
        setHistory(JSON.parse(localStorage.getItem(LS.HISTORY) || "[]"));
        setLastWorkoutExercises(JSON.parse(localStorage.getItem(LS.LAST_NAMES) || "[]"));

        // Restore Hellfire active
        const active = JSON.parse(localStorage.getItem(LS.ACTIVE) || "null");
        if (active?.workout?.length) {
          setWorkout(active.workout);
          setLevel(active.level ?? "beginner");
          setTotalSU(active.totalSU ?? 300);
          setHfTime(active.time ?? 0);
          setHfTimerRunning(!!active.timerRunning);
          setHfGeneratedSU(active.generatedSU ?? 0);
        }

        // Restore Flow active
        const flowActive = JSON.parse(localStorage.getItem(LS.FLOW_ACTIVE) || "null");
        if(flowActive?.flow?.length){
          setFlowList(flowActive.flow);
          setFlowCount(flowActive.count ?? 5);
          setFlowDoubleCat(flowActive.doubleCat ?? null);
          setFlowTimerPreset(flowActive.timerSeconds ?? 600);
          setFlowRemaining(flowActive.remaining ?? (flowActive.timerSeconds ?? 600));
          setFlowRunning(!!flowActive.running);
          setS2Phase(flowActive.s2Phase ?? "idle");
          setS2Remaining(flowActive.s2Remaining ?? 60);
          setS2Running(!!flowActive.s2Running);
        }else{
          const avoid = JSON.parse(localStorage.getItem(LS.FLOW_LAST_NAMES) || "[]");
          const gen = generateFlow22({count:5, avoidNames:avoid});
          setFlowList(gen.flow);
          setFlowDoubleCat(gen.doubleCat);
          setFlowRemaining(600);
        }

        setSuggested(getSuggestedMode());
      }, []);

      // Persist UI mode
      useEffect(()=>{
        localStorage.setItem(LS.UI_MODE, mode);
      }, [mode]);

      // Persist Strength active
      useEffect(()=>{
        localStorage.setItem(LS.STRENGTH_ACTIVE, JSON.stringify({ order: strengthOrder, sets: strengthSets, repsStack: strengthRepsStack }));
      }, [strengthOrder, strengthSets, strengthRepsStack]);

      // Persist stability
      useEffect(()=>{
        localStorage.setItem(LS.STRENGTH_STABILITY, JSON.stringify({ value: stability }));
      }, [stability]);

      // Sync suggested (tab-to-tab)
      useEffect(()=>{
        const onStorage = (e) => {
          if(e.key === LS.LAST_COMPLETED) setSuggested(getSuggestedMode());
        };
        window.addEventListener("storage", onStorage);
        return ()=>window.removeEventListener("storage", onStorage);
      }, []);

      // ===== Hellfire timer effect =====
      useEffect(()=>{
        if(hfTimerRunning){
          if(hfIntervalRef.current) clearInterval(hfIntervalRef.current);
          hfIntervalRef.current = setInterval(()=> setHfTime(prev=>prev+1), 1000);
        }else if(hfIntervalRef.current){
          clearInterval(hfIntervalRef.current);
          hfIntervalRef.current = null;
        }
        return ()=>{ if(hfIntervalRef.current) clearInterval(hfIntervalRef.current); };
      }, [hfTimerRunning]);

      // Persist Hellfire active workout (session memory)
      useEffect(()=>{
        if(workout?.length){
          localStorage.setItem(LS.ACTIVE, JSON.stringify({
            workout, level, totalSU, generatedSU: hfGeneratedSU, time: hfTime, timerRunning: hfTimerRunning, startedAt: Date.now()
          }));
        }else{
          localStorage.removeItem(LS.ACTIVE);
        }
      }, [workout, level, totalSU, hfGeneratedSU, hfTime, hfTimerRunning]);


      // ===== Flow timer effect (segment 3 countdown) =====
      useEffect(()=>{
        if(flowRunning){
          if(flowIntervalRef.current) clearInterval(flowIntervalRef.current);
          flowIntervalRef.current = setInterval(()=> setFlowRemaining(prev => Math.max(0, prev - 1)), 1000);
        }else if(flowIntervalRef.current){
          clearInterval(flowIntervalRef.current);
          flowIntervalRef.current = null;
        }
        return ()=>{ if(flowIntervalRef.current) clearInterval(flowIntervalRef.current); };
      }, [flowRunning]);

      // Segment 2 timer effect
      useEffect(()=>{
        if(s2Running){
          if(s2IntervalRef.current) clearInterval(s2IntervalRef.current);
          s2IntervalRef.current = setInterval(()=> setS2Remaining(prev => Math.max(0, prev - 1)), 1000);
        }else if(s2IntervalRef.current){
          clearInterval(s2IntervalRef.current);
          s2IntervalRef.current = null;
        }
        return ()=>{ if(s2IntervalRef.current) clearInterval(s2IntervalRef.current); };
      }, [s2Running]);

      // Persist Flow active (includes Segment 2 state)
      useEffect(()=>{
        if(flowList?.length){
          localStorage.setItem(LS.FLOW_ACTIVE, JSON.stringify({
            flow: flowList,
            count: flowCount,
            doubleCat: flowDoubleCat,
            timerSeconds: flowTimerPreset,
            remaining: flowRemaining,
            running: flowRunning,
            s2Phase, s2Remaining, s2Running,
            createdAt: Date.now()
          }));
        }else{
          localStorage.removeItem(LS.FLOW_ACTIVE);
        }
      }, [flowList, flowCount, flowDoubleCat, flowTimerPreset, flowRemaining, flowRunning, s2Phase, s2Remaining, s2Running]);

      // Beeps: Flow segment 3 minute ticks + end
      const flowLastMinuteRef = useRef(null);
      useEffect(()=>{
        if(!flowRunning || !beepsOn) return;
        const mm = Math.ceil(flowRemaining / 60);
        if(flowLastMinuteRef.current === null) flowLastMinuteRef.current = mm;
        if(mm < flowLastMinuteRef.current){
          beep(880,0.08);
          flowLastMinuteRef.current = mm;
        }
        if(flowRemaining === 0) tripleBeep();
      }, [flowRemaining, flowRunning, beepsOn]);

      // Segment 2 beeps + auto-advance phases
      useEffect(()=>{
        if(!s2Running || !beepsOn) return;
        if(s2Remaining === 0) tripleBeep();
        else if(s2Remaining === 1) beep(880,0.08);
      }, [s2Remaining, s2Running, beepsOn]);

      useEffect(()=>{
        if(s2Running && s2Remaining <= 0){
          setS2Running(false);
          const next = (ph) => {
            if(ph === "right") return "rest1";
            if(ph === "rest1") return "left";
            if(ph === "left") return "rest2";
            if(ph === "rest2") return "idle";
            return "idle";
          };
          const n = next(s2Phase);
          setS2Phase(n);
          if(n !== "idle") setS2Remaining(60);
        }
      }, [s2Remaining, s2Running, s2Phase]);

      // Stop Flow at 0
      useEffect(()=>{
        if(flowRunning && flowRemaining <= 0){
          setFlowRunning(false);
          releaseWakeLock(wl, setWl);
        }
      }, [flowRemaining, flowRunning]);

      /**********************
       * Wakelock behavior
       * - Flow running => wakelock on
       * - Hellfire timer running => wakelock on
       **********************/
      useEffect(()=>{
        const needs = flowRunning || hfTimerRunning;
        if(needs){
          requestWakeLock(setWl);
        }else{
          releaseWakeLock(wl, setWl);
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [flowRunning, hfTimerRunning]);

      // Re-acquire wakelock when coming back to foreground
      useEffect(()=>{
        const onVis = () => {
          if(document.visibilityState === "visible" && (flowRunning || hfTimerRunning)){
            requestWakeLock(setWl);
          }
        };
        document.addEventListener("visibilitychange", onVis);
        return ()=>document.removeEventListener("visibilitychange", onVis);
      }, [flowRunning, hfTimerRunning]);

      /**********************
       * UI helpers
       **********************/
      const modeLabel = (m) => {
        if(m==="strength") return "Strength (H)";
        if(m==="flow") return "Flow (L)";
        if(m==="hellfire") return "Fatigue (M)";
        return "Auto";
      };
      const modePill = () => {
        if(mode !== "auto") return `Handmatig: ${modeLabel(mode)}`;
        return `Auto: vandaag ${modeLabel(suggested)}`;
      };

      const activeBadge = (k) => effectiveMode === k ? <span className="pill">vandaag</span> : <span className="pill">—</span>;

      /**********************
       * Strength actions
       **********************/
      const shuffleStrength = () => setStrengthOrder(prev => shuffleArray(prev));
      const resetStrength = () => {
        setStrengthRepsStack(Object.fromEntries(BIG_SIX.map(x=>[x.key, []])));
      };
      const addRepSet = (key, reps=5) => {
        const r = Math.max(1, Math.min(5, Math.round(Number(reps) || 5)));
        setStrengthRepsStack(prev => {
          const next = { ...prev };
          const arr = Array.isArray(next[key]) ? [...next[key]] : [];
          arr.push(r);
          next[key] = arr;
          return next;
        });
      };
      const removeLastSet = (key) => {
        setStrengthRepsStack(prev => {
          const next = { ...prev };
          const arr = Array.isArray(next[key]) ? [...next[key]] : [];
          arr.pop();
          next[key] = arr;
          return next;
        });
      };

      const isStrengthSessionClean = (orderedLifts) => {
        // Clean = every logged set is exactly 5 reps, for every lift.
        for(const l of orderedLifts){
          const stack = strengthRepsStack?.[l.key] || [];
          if(!stack.length) return false;
          if(stack.some(r => Number(r) !== 5)) return false;
        }
        return true;
      };
      const completeStrength = () => {
        const ordered = strengthOrder.map(k => BIG_SIX.find(x => x.key === k)).filter(Boolean);
        const clean = isStrengthSessionClean(ordered);

        // Buffered stability rule:
        // - clean: +1 up to 6
        // - miss: if <3 => 0, else => 3
        setStability(prev => {
          const p = Math.max(0, Math.min(6, Math.floor(prev || 0)));
          if(clean) return Math.min(6, p + 1);
          return (p >= 3) ? 3 : 0;
        });

        markCompleted("strength");
        setSuggested(getSuggestedMode());
        alert(clean ? "Strength afgerond (clean 5-rep sessie)." : "Strength afgerond (niet-clean: niet alle sets waren 5 reps)." );
      };

      /**********************
       * Hellfire actions
       **********************/
      const startHfTimer = () => { setHfTime(0); setHfTimerRunning(true); };
      const stopHfTimer = () => {
        setHfTimerRunning(false);
        alert(`Workout time: ${fmtClock(hfTime)}`);
        if(history.length > 0){
          const updated = [...history];
          updated[0].time = fmtClock(hfTime);
          setHistory(updated);
          localStorage.setItem(LS.HISTORY, JSON.stringify(updated));
        }
      };

      const saveToHistory = (type, workoutData, note=null) => {
        const now = new Date();
        const entry = {
          date: now.toLocaleString(),
          type,
          level,
          totalSU,
          exercises: workoutData.map(ex => ({
            name: ex.name,
            reps: ex.reps || ex.formattedReps,
            pattern: ex.pattern,
            su: ex.su,
            unilateral: ex.unilateral,
            video: ex.video || null
          })),
          note
        };
        const updated = [entry, ...history].slice(0,5);
        setHistory(updated);
        localStorage.setItem(LS.HISTORY, JSON.stringify(updated));
      };

      const keyForCat = (cat) => ({Push:"push", Pull:"pull", Squat:"squat", Hinge:"hinge"}[cat] || cat);

      const consumeFlowBias = () => {
        const raw = localStorage.getItem(LS.FLOW_TO_HF);
        if(!raw) return null;
        try{
          const obj = JSON.parse(raw);
          if(!obj || obj.used) return null;
          localStorage.setItem(LS.FLOW_TO_HF, JSON.stringify({ ...obj, used:true, usedAt: Date.now() }));
          return obj;
        }catch(e){ return null; }
      };

      const generateWorkout = () => {
        const hasActive = (workout && workout.length);
        if(hasActive && !confirm("Er staat nog een actieve Fatigue sessie. Overschrijven met een nieuwe?")) return;

        setHfTimerRunning(false);
        setHfTime(0);
        setHfGeneratedSU(0);

        const bias = consumeFlowBias();
        const avoidPattern = bias?.doubleCat ? keyForCat(bias.doubleCat) : null;
        let preferType = null;
        if(bias?.ballistic > bias?.grind) preferType = "Grind";
        if(bias?.grind > bias?.ballistic) preferType = "Ballistic";

        const db = exerciseDatabase[level];
        const patterns = Object.keys(db);
        let exercises = [];
        let currentSU = 0;
        let patternCount = {};

        const lastNames = lastWorkoutExercises || [];

        const pickExercise = (pattern) => {
          const basePool = db[pattern] || [];
          if(!basePool.length) return null;

          const candidates = basePool.filter(opt => !lastNames.includes(opt.name));
          const pool1 = candidates.length ? candidates : basePool;

          if(preferType && Math.random() < 0.60){
            const typed = pool1.filter(x => x.type === preferType);
            if(typed.length) return typed[Math.floor(Math.random() * typed.length)];
          }
          return pool1[Math.floor(Math.random() * pool1.length)];
        };

        patterns.forEach(pattern => {
          if(avoidPattern && pattern === avoidPattern) patternCount[pattern] = 0;
          const exercise = pickExercise(pattern);
          if(!exercise) return;

          const range1 = totalSU >= 500 ? [40,80] : (totalSU >= 400 ? [35,75] : [30,70]);
          const suForExercise = Math.floor(Math.random() * (range1[1] - range1[0] + 1)) + range1[0]; // scaled
          const reps = Math.round(suForExercise / exercise.stimulus);

          currentSU += suForExercise;
          patternCount[pattern] = 1;

          exercises.push({
            ...exercise,
            pattern,
            reps,
            su: suForExercise,
            formattedReps: exercise.unilateral ? (reps + " reps (" + Math.ceil(reps/2) + " per arm)") : (reps + " reps")
          });
        });

        while(currentSU < totalSU - 30){
          const pattern = patterns[Math.floor(Math.random() * patterns.length)];
          if(patternCount[pattern] >= 2) continue;
          if(avoidPattern && pattern === avoidPattern && patternCount[pattern] >= 1) continue;

          const exercise = pickExercise(pattern);
          if(!exercise) continue;

          const range2 = totalSU >= 500 ? [40,80] : (totalSU >= 400 ? [35,75] : [30,70]);
          const suForExercise = Math.floor(Math.random() * (range2[1] - range2[0] + 1)) + range2[0];
          if(currentSU + suForExercise > totalSU + 10) break;

          const reps = Math.round(suForExercise / exercise.stimulus);

          currentSU += suForExercise;
          patternCount[pattern] = (patternCount[pattern] || 0) + 1;

          exercises.push({
            ...exercise,
            pattern,
            reps,
            su: suForExercise,
            formattedReps: exercise.unilateral ? (reps + " reps (" + Math.ceil(reps/2) + " per arm)") : (reps + " reps")
          });
        }

        const finalList = ensureNoAdjacentDuplicateExercises(shuffleArray(exercises));
        const genSU = finalList.reduce((a,x)=>a + (Number.isFinite(x.su)?x.su:0), 0);
        setHfGeneratedSU(genSU);
        setWorkout(finalList);
        saveToHistory("workout", finalList, null);
        localStorage.setItem(LS.LAST_NAMES, JSON.stringify(finalList.map(e => e.name)));
        setLastWorkoutExercises(finalList.map(e => e.name));
      };

      const completeHellfire = () => {
        if(hfTimerRunning){
          if(!confirm("Timer loopt nog. Stoppen en afronden?")) return;
          stopHfTimer();
        }
        setWorkout([]);
        setHfGeneratedSU(0);
        localStorage.removeItem(LS.ACTIVE);

        markCompleted("hellfire");
        setSuggested(getSuggestedMode());
        alert("Fatigue afgerond.");
      };

      const abandonHellfire = () => {
        if(!workout.length) return;
        if(!confirm("Huidige Fatigue sessie weggooien (niet afronden)?")) return;
        setWorkout([]);
        setHfGeneratedSU(0);
        localStorage.removeItem(LS.ACTIVE);
      };

      const toggleExpand = (idx) => setExpandedIndex(expandedIndex === idx ? null : idx);

      /**********************
       * Flow actions
       **********************/
      const newFlow = () => {
        const avoid = JSON.parse(localStorage.getItem(LS.FLOW_LAST_NAMES) || "[]");
        const gen = generateFlow22({count: flowCount, avoidNames: avoid});
        setFlowList(gen.flow);
        setFlowDoubleCat(gen.doubleCat);

        setFlowRunning(false);
        flowLastMinuteRef.current = null;
        setFlowRemaining(flowTimerPreset);

        setS2Running(false);
        setS2Phase("idle");
        setS2Remaining(60);
      };

      const applyTimerPreset = (sec) => {
        setFlowTimerPreset(sec);
        setFlowRemaining(sec);
        flowLastMinuteRef.current = null;
      };

      const flowStartPause = async () => {
        if(flowRunning){
          setFlowRunning(false);
          return;
        }
        flowLastMinuteRef.current = Math.ceil(flowRemaining / 60);
        setFlowRunning(true);
        if(beepsOn) beep(660,0.10);
      };

      const flowReset = async () => {
        setFlowRunning(false);
        flowLastMinuteRef.current = null;
        setFlowRemaining(flowTimerPreset);
      };

      const s2Label = (ph) => {
        if(ph === "right") return "Rechts — flow aan elkaar";
        if(ph === "rest1") return "Rust — 1 minuut";
        if(ph === "left") return "Links — flow aan elkaar";
        if(ph === "rest2") return "Rust — 1 minuut";
        return "Klaar / idle";
      };

      const s2Start = () => {
        let ph = s2Phase;
        if(ph === "idle"){
          ph = "right";
          setS2Phase("right");
          setS2Remaining(60);
        }
        setS2Running(true);
        if(beepsOn) beep(660,0.10);
      };
      const s2Pause = () => setS2Running(false);
      const s2Reset = () => {
        setS2Running(false);
        setS2Phase("idle");
        setS2Remaining(60);
      };
      const s2Next = () => {
        const next = (ph) => {
          if(ph === "idle") return "right";
          if(ph === "right") return "rest1";
          if(ph === "rest1") return "left";
          if(ph === "left") return "rest2";
          if(ph === "rest2") return "idle";
          return "idle";
        };
        const n = next(s2Phase);
        setS2Phase(n);
        setS2Remaining(60);
        setS2Running(false);
      };

      const completeFlow = async () => {
        setFlowRunning(false);

        localStorage.setItem(LS.FLOW_LAST_NAMES, JSON.stringify(flowList.map(x => x.name)));

        const ballistic = flowList.filter(x => x.type === "ballistic").length;
        const grind = flowList.filter(x => x.type === "grind").length;
        localStorage.setItem(LS.FLOW_TO_HF, JSON.stringify({
          doubleCat: flowDoubleCat || "Push",
          ballistic,
          grind,
          used: false,
          createdAt: Date.now()
        }));

        markCompleted("flow");
        setSuggested(getSuggestedMode());
        alert("Flow afgerond.");
      };

      /**********************
       * UI components
       **********************/
      const StrengthBody = () => {
        const ordered = strengthOrder.map(k => BIG_SIX.find(x => x.key === k)).filter(Boolean);
        const minSets = 3;
        const targetSets = 5;
        const ready = ordered.every(l => (strengthSets[l.key] || 0) >= minSets);
        const cleanNow = ordered.every(l => {
          const stack = strengthRepsStack?.[l.key] || [];
          return stack.length >= minSets && stack.every(r => Number(r) === 5);
        });
        const nudge = stability >= 6;
        return (
          <div className="sectionBody">
            <div className="row" style={{justifyContent:"flex-start"}}>
              <button className="btn primary" onClick={shuffleStrength}>Shuffle</button>
              <button className="btn" onClick={resetStrength}>Reset</button>
              <button className={"btn " + (ready ? "primary" : "")} onClick={completeStrength} title={"Complete (minimaal " + minSets + " sets per lift)"}>Complete</button>
              <span className="pill">stabiliteit: <b>{stability}</b>/6</span>
              {nudge ? <span className="pill" title="Subtiele nudge — het is een keuze">🟢 mastered • overweeg +4 kg wave</span> : (cleanNow ? <span className="pill">clean 5s</span> : <span className="pill">—</span>)}
            </div>

            <ul className="list">
              {ordered.map((l, idx) => (
                <li key={l.key} className="card">
                  <div>
                    <div style={{fontWeight:900}}>{idx+1}. {l.name}</div>
                    <div className="small">{l.target}</div>
                    <div className="small" style={{marginTop:6}}>
                      sets: <b>{strengthSets[l.key] || 0}</b> • laatste reps: <b>{(strengthRepsStack?.[l.key]?.length ? strengthRepsStack[l.key][strengthRepsStack[l.key].length-1] : "—")}</b>
                    </div>
                  </div>
                  <div className="right">
                    <div className="row" style={{justifyContent:"flex-end"}}>
                      <button className="btn" onClick={()=>removeLastSet(l.key)} title="Verwijder laatste set">-</button>
                      <button className="btn" onClick={()=>addRepSet(l.key, 3)}>+3</button>
                      <button className="btn" onClick={()=>addRepSet(l.key, 4)}>+4</button>
                      <button className="btn primary" onClick={()=>addRepSet(l.key, 5)}>+5</button>
                    </div>
                    <div className="small">doel: <b>{targetSets}</b> sets (indicatie)</div>
                    <div className="barWrap" aria-hidden="true" style={{marginTop:6, marginLeft:"auto"}}>
                      <div className="barFill" style={{width: ((Math.min(1, (strengthSets[l.key]||0)/targetSets)*100)) + "%"}}></div>
                    </div>
                  </div>
                </li>
              ))}
            </ul>
          </div>
        );
      };

      const FlowBody = () => (
        <div className="sectionBody">
          <div className="row" style={{justifyContent:"flex-start"}}>
            {[4,5,6].map(n => (
              <button
                key={n}
                className={"btn " + (flowCount===n ? "primary" : "")}
                onClick={() => {
                  setFlowCount(n);
                  const avoid = JSON.parse(localStorage.getItem(LS.FLOW_LAST_NAMES) || "[]");
                  const gen = generateFlow22({count:n, avoidNames:avoid});
                  setFlowList(gen.flow);
                  setFlowDoubleCat(gen.doubleCat);

                  setFlowRunning(false);
                  flowLastMinuteRef.current = null;
                  setFlowRemaining(flowTimerPreset);

                  setS2Running(false);
                  setS2Phase("idle");
                  setS2Remaining(60);
                }}
              >
                {n} oefeningen
              </button>
            ))}
            <button className="btn primary" onClick={newFlow}>Nieuwe</button>
            <label className="small" style={{display:"flex", alignItems:"center", gap:8}}>
              <input type="checkbox" checked={beepsOn} onChange={()=>setBeepsOn(!beepsOn)} />
              beeps
            </label>
          </div>

          <div className="row" style={{justifyContent:"flex-start", marginTop:8}}>
            <button className={"btn " + (flowTimerPreset===10*60 ? "primary" : "")} onClick={()=>applyTimerPreset(10*60)}>
              10:00
            </button>
            <button className={"btn " + (flowTimerPreset===15*60 ? "primary" : "")} onClick={()=>applyTimerPreset(15*60)}>
              15:00
            </button>
            <span className="pill">wakelock: {wl.supported ? (wl.active ? "aan" : "uit") : "niet ondersteund"}</span>
          </div>

          <div className="section" style={{margin:"12px 0", borderRadius:12}}>
            <div className="sectionHead">
              <div className="sectionTitle">Segment 1</div>
              <div className="pill">dubbel: {flowDoubleCat || "—"}</div>
            </div>
            <div className="sectionBody" style={{paddingBottom:0}}>
              <div className="card" style={{marginBottom:12}}>
                <div style={{flex:1}}>
                  <div className="small">Flow identity</div>
                  <div style={{fontWeight:900, marginTop:2}}>
                    Ballistic: {flowList.filter(x=>x.type==="ballistic").length} • Grind: {flowList.filter(x=>x.type==="grind").length} • Oefeningen: {flowList.length}
                  </div>
                  <div className="small" style={{marginTop:4}}>Dubbel patroon: <b>{flowDoubleCat || "—"}</b></div>
                </div>
              </div>
            </div>
            <div className="sectionBody">
              <ul className="list">
                {flowList.map((m, idx)=> (
                  <li key={idx} className="card">
                    <div>
                      <div style={{fontWeight:900}}>{idx+1}. {m.name}</div>
                      <div className="small">
                        <span className="kbd">{m.cat}</span>{" "}
                        <span className="kbd">{m.type}</span>{" "}
                        {flowDoubleCat && m.cat===flowDoubleCat ? <span className="kbd">×2</span> : null}
                      </div>
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <div className="section" style={{margin:"12px 0", borderRadius:12}}>
            <div className="sectionHead">
              <div className="sectionTitle">Segment 2</div>
              <div className="pill">{s2Label(s2Phase)}</div>
            </div>
            <div className="sectionBody">
              <div className="card" style={{alignItems:"flex-start"}}>
                <div>
                  <div className="small">timer</div>
                  <div className="timer">{fmtClock(s2Remaining)}</div>
                  <div className="small">{s2Label(s2Phase)}</div>
                </div>
                <div className="row" style={{justifyContent:"flex-end"}}>
                  {!s2Running ? (
                    <button className="btn primary" onClick={s2Start}>Start</button>
                  ) : (
                    <button className="btn" onClick={s2Pause}>Pauze</button>
                  )}
                  <button className="btn" onClick={s2Next}>Next</button>
                  <button className="btn" onClick={s2Reset}>Reset</button>
                </div>
              </div>
            </div>
          </div>

          <div className="section" style={{margin:"12px 0", borderRadius:12}}>
            <div className="sectionHead">
              <div className="sectionTitle">Segment 3</div>
              <div className="pill">{(s2Phase==="idle" && !flowRunning && flowRemaining===flowTimerPreset) ? "klaar voor start" : "continuous"}</div>
            </div>
            <div className="sectionBody">
              <div className="card" style={{alignItems:"flex-start"}}>
                <div>
                  <div className="small">timer</div>
                  <div className="timer">{fmtClock(flowRemaining)}</div>
                </div>
                <div className="row" style={{justifyContent:"flex-end"}}>
                  <button className={"btn " + (flowRunning ? "" : "primary")} onClick={flowStartPause}>
                    {flowRunning ? "Pauze" : "Start"}
                  </button>
                  <button className="btn" onClick={flowReset}>Reset</button>
                  <button className="btn primary" onClick={completeFlow}>Complete</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      const HellfireBody = () => (
        <div className="sectionBody">
          <div className="row" style={{justifyContent:"flex-start"}}>
            <button className={"btn " + (level==="beginner" ? "primary" : "")} onClick={()=>setLevel("beginner")}>beginner</button>
            <button className={"btn " + (level==="advanced" ? "primary" : "")} onClick={()=>setLevel("advanced")}>advanced</button>

            {[300,400,500].map(v => (
              <button key={v} className={"btn " + (totalSU===v ? "primary" : "")} onClick={()=>setTotalSU(v)}>
                {v} SU
              </button>
            ))}

            <button className="btn primary" onClick={generateWorkout}>Generate</button>
            <span className="pill">wakelock: {wl.supported ? (wl.active ? "aan" : "uit") : "niet ondersteund"}</span>
          </div>

          <div className="small" style={{marginTop:10}}>
            Generated: <b>{hfGeneratedSU}</b> / {totalSU} SU
          </div>

{workout.length > 0 ? (
            <>
              <ul className="list" style={{marginTop:12}}>
                {workout.map((ex, idx) => (
                  <li key={idx} className="card" style={{alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:900}}>{idx+1}. {ex.name}</div>
                      <div className="small">
                        <b>{ex.unilateral ? `${ex.reps} reps (${Math.ceil(ex.reps/2)} per arm)` : `${ex.reps} reps`}</b>
                      </div>
                      {ex.video ? (
                        <div style={{marginTop:8}}>
                          <a className="kbd" href={ex.video} target="_blank" rel="noopener noreferrer">demo</a>
                        </div>
                      ) : null}
                    </div>
                  </li>
                ))}
              </ul>

              <div className="row" style={{justifyContent:"flex-start", marginTop:12}}>
                {!hfTimerRunning ? (
                  <button className="btn primary" onClick={startHfTimer}>Start timer</button>
                ) : (
                  <>
                    <span className="pill">⏱ {fmtClock(hfTime)}</span>
                    <button className="btn" onClick={stopHfTimer}>Stop timer</button>
                  </>
                )}
                <button className="btn primary" onClick={completeHellfire}>Complete</button>
                <button className="btn" onClick={abandonHellfire}>Discard</button>
              </div>
            </>
          ) : (
            <div className="small" style={{marginTop:10}}>Generate maakt een SU-workout. (sessie blijft bewaard bij refresh)</div>
          )}

          {history.length > 0 && (
            <div style={{marginTop:14}}>
              <div className="small" style={{marginBottom:8}}>History (laatste 5)</div>
              <ul className="list">
                {history.map((h, i) => (
                  <li key={i} className="card" style={{cursor:"pointer"}} onClick={()=>toggleExpand(i)}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800}}>{h.date}</div>
                      <div className="small">{h.level + " • " + h.totalSU + " SU" + (h.time ? (" • " + h.time) : "")}</div>
                      {expandedIndex === i && (
                        <div className="small" style={{marginTop:8}}>
                          <ul style={{margin:0, paddingLeft:16}}>
                            {h.exercises?.map((ex, idx)=> (
                              <li key={idx}>{ex.name} — {String(ex.reps)}</li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                    <div className="pill">{expandedIndex===i ? "▲" : "▼"}</div>
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      );

      return (
        <div>
          <h1>Three Pillars</h1>
          <div className="sub">{modePill()}</div>

          <div className="small" style={{textAlign:"center", marginBottom:10}}>Tip: klik op de sectiekop om die pijler te openen.</div>

          <div className="row" style={{marginBottom:10}}>
            {["auto","strength","flow","hellfire"].map(m => (
              <button
                key={m}
                className={"btn " + (mode===m ? "primary" : "")}
                onClick={()=>setMode(m)}
                title={m==="auto" ? "Auto rotateert H → L → M zodra je 'Complete' drukt." : "Handmatig vastzetten."}
              >
                {m==="auto" ? "Auto (H→L→M)" : modeLabel(m)}
              </button>
            ))}
          </div>

          <div className="section">
            <div className="sectionHead" style={{cursor:"pointer"}} onClick={()=>setMode("strength")}>
              <div className="sectionTitle">🔵 Strength as a Skill (H)</div>
              {activeBadge("strength")}
            </div>
            {effectiveMode === "strength" ? <StrengthBody/> : <div className="sectionBody"><div className="small">Big Six • shuffle volgorde • set-tellers blijven bewaard bij refresh</div></div>}
          </div>

          <div className="section">
            <div className="sectionHead" style={{cursor:"pointer"}} onClick={()=>setMode("flow")}>
              <div className="sectionTitle">🟢 Movement Exploration (L)</div>
              {activeBadge("flow")}
            </div>
            {effectiveMode === "flow" ? <FlowBody/> : <div className="sectionBody"><div className="small">Flow 2.2 • timers & segment 2 state blijven bewaard bij refresh</div></div>}
          </div>

          <div className="section">
            <div className="sectionHead" style={{cursor:"pointer"}} onClick={()=>setMode("hellfire")}>
              <div className="sectionTitle">🔴 Fatigue Management (M)</div>
              {activeBadge("hellfire")}
            </div>
            {effectiveMode === "hellfire" ? <HellfireBody/> : <div className="sectionBody"><div className="small">SU generator • actieve sessie + timer blijven bewaard bij refresh</div></div>}
          </div>

          <div className="small" style={{textAlign:"center", marginTop:10}}>
            Auto rotatie wisselt pas als je bij de actieve pijler op <b>Complete</b> drukt.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
